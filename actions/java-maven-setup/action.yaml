name: "Setup Maven"
description: "Setup Java and Maven"

inputs:
  maven-version:
    description: "Maven version to be installed."
    required: true
  java-distribution:
    description: "Java distribution to be installed. (Default is temurin)"
    required: false
    default: "temurin"
  java-version:
    description: "Java version to be installed. (Default is 17)"
    required: false
    default: "17"
runs:
  using: "composite"
  steps:
    - uses: actions/setup-java@v5
      with:
        distribution: ${{ inputs.java-distribution }}
        java-version: ${{ inputs.java-version }}

    - name: Set up Maven
      uses: stCarolas/setup-maven@v5
      with:
        maven-version: ${{ inputs.maven-version }}
